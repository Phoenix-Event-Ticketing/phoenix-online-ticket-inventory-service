openapi: 3.0.3
info:
  title: Phoenix Online — Ticket Inventory Service
  version: 0.1.0
  description: >
    Ticket types, quantities, temporary holds, confirm/release flows.
    Protected routes require `Authorization: Bearer <JWT>` from the User Service (user tokens with
    `permissions` claims) or service tokens (`typ: service`, `sub` = service id) combined with
    `SERVICE_REGISTRY` for allowed permissions per caller.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
  - name: Inventory
  - name: Reservations

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness/readiness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /inventory:
    get:
      tags: [Inventory]
      summary: Service name (public discovery)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: ticket-inventory-service
    post:
      tags: [Inventory]
      summary: Create a single ticket inventory record
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created
        "400":
          description: Bad request
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (CREATE_TICKET_TYPE)
        "404":
          description: Event not found
        "503":
          description: Event service unavailable

  /inventory/bulk:
    post:
      tags: [Inventory]
      summary: Create multiple ticket categories for one event
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created
        "400":
          description: Bad request
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (CREATE_TICKET_TYPE)
        "404":
          description: Event not found
        "503":
          description: Event service unavailable

  /inventory/{inventoryId}:
    get:
      tags: [Inventory]
      summary: Get one inventory record
      security:
        - bearerAuth: []
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (VIEW_TICKET_INVENTORY)
        "501":
          description: Not implemented (scaffold)
    put:
      tags: [Inventory]
      summary: Update ticket type or quantity
      security:
        - bearerAuth: []
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (UPDATE_TICKET_INVENTORY)
        "501":
          description: Not implemented (scaffold)

  /inventory/event/{eventId}:
    get:
      tags: [Inventory]
      summary: List all ticket categories for an event
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (VIEW_TICKET_INVENTORY)
        "501":
          description: Not implemented (scaffold)

  /inventory/event/{eventId}/availability:
    get:
      tags: [Inventory]
      summary: Availability summary for an event
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (VIEW_TICKET_INVENTORY)
        "501":
          description: Not implemented (scaffold)

  /inventory/hold:
    post:
      tags: [Reservations]
      summary: Temporarily reserve tickets
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HoldRequest"
      responses:
        "200":
          description: OK
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (RESERVE_TICKET)
        "501":
          description: Not implemented (scaffold)

  /inventory/confirm:
    post:
      tags: [Reservations]
      summary: Confirm held tickets as sold
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (RESERVE_TICKET)
        "501":
          description: Not implemented (scaffold)

  /inventory/release:
    post:
      tags: [Reservations]
      summary: Release held tickets back to stock
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Missing or invalid JWT
        "403":
          description: Missing required permission (RESERVE_TICKET)
        "501":
          description: Not implemented (scaffold)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        User JWT (permissions claim) or service JWT (typ=service, sub=service id; allowed permissions
        from SERVICE_REGISTRY).

  schemas:
    TicketType:
      type: string
      enum: [VIP, STANDARD, EARLY_BIRD]
    HoldStatus:
      type: string
      enum: [HELD, CONFIRMED, RELEASED]
    HoldRequest:
      type: object
      required: [eventId, ticketType, quantity, bookingId]
      properties:
        eventId:
          type: string
          example: evt_101
        ticketType:
          $ref: "#/components/schemas/TicketType"
        quantity:
          type: integer
          minimum: 1
          example: 2
        bookingId:
          type: string
          example: book_501
    HoldResponse:
      type: object
      properties:
        bookingId:
          type: string
        holdStatus:
          $ref: "#/components/schemas/HoldStatus"
        expiresAt:
          type: string
          format: date-time
