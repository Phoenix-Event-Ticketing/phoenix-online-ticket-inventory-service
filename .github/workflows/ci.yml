name: CI

on:

  push: 
    branches: [main, dev]

  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet localhost/test --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)" || (echo "Code is not formatted. Run gofmt."; exit 1)

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -v ./... -count=1 -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  govulncheck:
    name: Govulncheck Security Scan
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run govulncheck and generate SARIF
        id: govulncheck
        continue-on-error: true
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.25.8"
          output-format: sarif
          output-file: govulncheck.sarif

      - name: Upload govulncheck results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck

      - name: Fail if govulncheck found vulnerabilities
        if: steps.govulncheck.outcome == 'failure'
        run: |
          echo "govulncheck found reachable vulnerabilities. Check the GitHub Security tab for details."
          exit 1

  security:
    name: Trivy Security Scans
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy FS vulnerability scan
        id: trivy_fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload FS scan to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy misconfiguration scan
        id: trivy_config
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload config scan to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Trivy secret scan
        id: trivy_secret
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: sarif
          output: trivy-secret.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload secret scan to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secret.sarif
          category: trivy-secret

      - name: Build Docker image
        run: docker build -t inventory-service:ci .

      - name: Trivy image scan
        id: trivy_image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: inventory-service:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload image scan to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Fail if Trivy found HIGH or CRITICAL issues
        if: |
          steps.trivy_fs.outcome == 'failure' ||
          steps.trivy_config.outcome == 'failure' ||
          steps.trivy_secret.outcome == 'failure' ||
          steps.trivy_image.outcome == 'failure'
        run: |
          echo "Trivy found HIGH or CRITICAL issues. Check the GitHub Security tab for details."
          exit 1

  sonar:
    name: SonarQube Cloud Analysis + Quality Gate
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Phoenix-Event-Ticketing_phoenix-online-ticket-inventory-service
            -Dsonar.organization=phoenix-event-ticketing
            -Dsonar.sources=.
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  push-image:
    name: Push Docker image to Artifact Registry
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [govulncheck, security, sonar]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ARTIFACT_REGISTRY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
      GCP_IMAGE_NAME: ${{ vars.GCP_IMAGE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/${GCP_IMAGE_NAME}"
          docker build -t "${IMAGE}:${GITHUB_SHA}" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            docker tag "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:dev-latest"
            docker push "${IMAGE}:dev-latest"
          fi
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            docker tag "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:main-latest"
            docker push "${IMAGE}:main-latest"
          fi